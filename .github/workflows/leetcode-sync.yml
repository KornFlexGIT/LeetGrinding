name: Auto Sync LeetCode to GitHub

# ตั้งเวลาให้ทำงานอัตโนมัติ (ตัวอย่างนี้คือทำงานทุกวันตอนเที่ยงคืน UTC)
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: # อนุญาตให้กดปุ่มรันเองได้ (Manual Run)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: ดึงข้อมูล Repository
      uses: actions/checkout@v3

    - name: ตั้งค่า Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: ติดตั้ง Library ที่จำเป็น
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: รันสคริปต์ดึงโค้ดจาก LeetCode
      env:
        LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
        CSRF_TOKEN: ${{ secrets.CSRF_TOKEN }}
      run: python sync.py

    - name: อัปเดตและบันทึกโค้ดลง GitHub (Commit & Push)
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "Auto-sync LeetCode solutions" || echo "No changes to commit"
        git push
